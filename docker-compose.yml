# Supabase self-hosting stack — déploiement VPS
# Documentation : https://supabase.com/docs/guides/self-hosting/docker

services:
  # ─── Base de données ─────────────────────────────────────────
  db:
    image: supabase/postgres:17.6.1.136
    container_name: rappels-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./volumes/db:/docker-entrypoint-initdb.d
      - ./migrations:/docker-entrypoint-initdb.d/migrations
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API Gateway (Kong) ──────────────────────────────────────
  kong:
    image: kong/kong:3.9.1
    container_name: rappels-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST,A
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./kong.yml:/etc/kong/kong.yml
    depends_on:
      db:
        condition: service_healthy

  # ─── Auth (GoTrue) ───────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.189.0
    container_name: rappels-auth
    restart: unless-stopped
    environment:
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_ISSUER: ${API_EXTERNAL_URL}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: "postgres"
      GOTRUE_DB_DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres"
      GOTRUE_MAILER_AUTOCONFIRM: "${MAILER_AUTOCONFIRM}"
      GOTRUE_LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy

  # ─── API REST (PostgREST) ────────────────────────────────────
  rest:
    image: postgrest/postgrest:v14.12
    container_name: rappels-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres"
      PGRST_DB_SCHEMA: "public,storage,graphql_public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_OPENAPI_SERVER_PROXY_URI: ${API_EXTERNAL_URL}
    depends_on:
      db:
        condition: service_healthy

  # ─── Realtime ─────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.102.3
    container_name: rappels-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: "db"
      DB_PORT: 5432
      DB_NAME: "postgres"
      DB_USER: "postgres"
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      REPLICATION_MODE: "stream"
      REPLICATION_SLOT: "realtime_replication_slot"
      REPLICATION_PLUGIN: "pgoutput"
      SECURE_CHANNELS: "true"
    depends_on:
      db:
        condition: service_healthy

  # ─── Storage ──────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.60.4
    container_name: rappels-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: "file"
      FILE_STORAGE_PATH: /var/lib/storage
      TENANT_ID: "default"
      REGION: "self-hosted"
    volumes:
      - storage-data:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  # ─── Metadata API (pg-meta, optionnel mais utile) ────────────
  meta:
    image: supabase/postgres-meta:v0.96.6
    container_name: rappels-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: "db"
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: "postgres"
      PG_META_DB_USER: "postgres"
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_DB_SSL: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
  storage-data:
