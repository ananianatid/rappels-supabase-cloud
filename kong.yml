# Kong declarative configuration for Rappels Supabase API gateway
# Routes all services through a single endpoint (port 8000)

_format_version: "3.0"
_transform: true

services:
  # ─── Auth (GoTrue) ───────────────────────────────────────────
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1/
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
    plugins:
      - name: cors

  # ─── REST API (PostgREST) ────────────────────────────────────
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1/
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
    plugins:
      - name: cors

  # ─── Realtime ─────────────────────────────────────────────────
  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1/
        strip_path: true
    plugins:
      - name: cors

  # ─── Storage ──────────────────────────────────────────────────
  - name: storage
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1/
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
    plugins:
      - name: cors

  # ─── Metadata ─────────────────────────────────────────────────
  - name: meta
    url: http://meta:8080
    routes:
      - name: meta-route
        paths:
          - /pg/
        strip_path: true
    plugins:
      - name: cors
